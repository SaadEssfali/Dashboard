version: "3.8"

services:
  homelab-os:
    image: saadessfali/homelab-os:latest
    container_name: homelab-os
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # ── Nginx Proxy Manager Connection ──
      # The dashboard will auto-discover all your proxy hosts
      - NPM_API_URL=http://npm:81           # Your NPM instance URL
      - NPM_API_EMAIL=admin@example.com     # NPM admin email
      - NPM_API_PASSWORD=changeme           # NPM admin password
    # Optional: add extra services manually alongside NPM auto-discovery
    # volumes:
    #   - ./services.json:/app/src/config/services.json:ro
